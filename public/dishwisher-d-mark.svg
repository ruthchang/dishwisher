<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DishWisher D Mark</title>
  <desc id="desc">Half-plate D mark used as placeholder for missing dish photos.</desc>
  <defs>
    <radialGradient id="rimGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(100 96) rotate(42) scale(110)">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E5E7EB"/>
    </radialGradient>
    <radialGradient id="innerGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(108 104) rotate(42) scale(82)">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F4F6"/>
    </radialGradient>
    <clipPath id="rightHalfPlate">
      <rect x="88" y="0" width="152" height="240"/>
    </clipPath>
  </defs>

  <rect width="240" height="240" rx="24" fill="#F8FAFC"/>
  <g clip-path="url(#rightHalfPlate)">
    <circle cx="88" cy="120" r="64" fill="url(#rimGrad)"/>
    <circle cx="88" cy="120" r="46" fill="url(#innerGrad)"/>
    <circle cx="88" cy="120" r="63" stroke="#D1D5DB" stroke-width="2"/>
    <circle cx="88" cy="120" r="46" stroke="#E5E7EB" stroke-width="2"/>
    <line x1="88" y1="57" x2="88" y2="183" stroke="#D1D5DB" stroke-width="2"/>
    <line x1="88" y1="74" x2="88" y2="166" stroke="#E5E7EB" stroke-width="2"/>
  </g>
</svg>
